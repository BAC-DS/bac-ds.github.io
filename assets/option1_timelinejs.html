<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timeline – Option 1: TimelineJS3</title>
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    h2 { text-align: center; padding: 1rem; color: #333; }
    #timeline-embed { width: 100%; height: 600px; }
  </style>
</head>
<body>
  <h2>Career Timeline</h2>
  <div id="timeline-embed"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>
    // Fetches the same timeline.json used by the Streamlit app.
    // On GitHub Pages, update the path below to match where you place the file,
    // e.g. "/assets/data/timeline.json"
    fetch('./timeline.json')
      .then(r => r.json())
      .then(data => {
        new TL.Timeline('timeline-embed', data, {
          timenav_position: 'bottom',
          duration: 500,
          zoom_sequence: [0.5, 1, 2, 3],
          language: 'en'
        });
      })
      .catch(err => {
        document.getElementById('timeline-embed').innerHTML =
          '<p style="padding:2rem;color:red;">Could not load timeline.json. ' +
          'Serve this file over HTTP (e.g. <code>python3 -m http.server</code>) rather than opening directly in a browser.</p>';
        console.error(err);
      });
  </script>
</body>
</html>
